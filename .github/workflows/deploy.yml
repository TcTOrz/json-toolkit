name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 🔧 關鍵修改 1: 設置 pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9  # 請使用您的專案匹配的 pnpm 版本，可以是 `9`, `8`, 或 `latest`

      # 🔧 關鍵修改 2: 使用 pnpm 安裝依賴
      - name: Install dependencies
        run: pnpm install --frozen-lockfile  # 這等同於 `npm ci`

      # 🔧 關鍵修改 3: 使用 pnpm 進行構建
      - name: Build project
        run: pnpm run build  # 這等同於 `npm run build`

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist  # 您的構建輸出目錄
